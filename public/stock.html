<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Goodcomex — Stock</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f3; color: #1a1a1a; padding-bottom: 60px; }

    .topbar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: #fff; border-top: 1px solid #e5e5e5; display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 52px; }
    .topbar-title { font-size: 15px; font-weight: 500; }
    .topbar-nav { display: flex; height: 100%; }
    .nav-tab { padding: 0 16px; font-size: 13px; color: #888; border-top: 2px solid transparent; display: flex; align-items: center; text-decoration: none; }
    .nav-tab:hover { color: #1a1a1a; }
    .nav-tab.active { color: #1a1a1a; border-top-color: #1a1a1a; font-weight: 500; }

    .btn { padding: 6px 14px; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; }
    .btn-primary { background: #1a1a1a; color: #fff; }
    .btn-outline { background: #fff; color: #1a1a1a; border: 0.5px solid #e5e5e5; }
    .btn-outline:hover { background: #f5f5f3; }
    .btn-success { background: #eaf3de; color: #27500a; border: none; }
    .btn-success:hover { background: #c0dd97; }
    .btn-warn { background: #faeeda; color: #633806; border: none; }
    .btn-sm { padding: 4px 10px; font-size: 11px; }

    .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: #fff; border: 0.5px solid #e5e5e5; border-radius: 16px; padding: 2rem; width: 100%; max-width: 360px; }
    .login-title { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
    .login-sub { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; }
    .field input, .field select, .field textarea { width: 100%; padding: 8px 12px; border: 0.5px solid #e5e5e5; border-radius: 8px; font-size: 14px; background: #fff; color: #1a1a1a; font-family: inherit; }
    .login-err { font-size: 13px; color: #a32d2d; margin-bottom: 1rem; display: none; }

    .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }

    .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .user-label { font-size: 12px; color: #888; margin-left: auto; }

    .stats { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 12px; margin-bottom: 1.5rem; }
    .stat { background: #fff; border: 0.5px solid #e5e5e5; border-radius: 12px; padding: 1rem 1.25rem; }
    .stat-label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .stat-value { font-size: 22px; font-weight: 500; }
    .stat-sub { font-size: 11px; color: #aaa; margin-top: 2px; }

    .cols { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 12px; }
    .col-wrap { }
    .col-title { font-size: 13px; font-weight: 500; padding: 10px 14px; border-radius: 10px 10px 0 0; display: flex; justify-content: space-between; align-items: center; }
    .col-body { background: #f0f0ee; border-radius: 0 0 10px 10px; padding: 8px; min-height: 200px; display: flex; flex-direction: column; gap: 8px; }

    .col-empaque .col-title { background: #D3D1C7; color: #2C2C2A; }
    .col-stock .col-title { background: #e6f1fb; color: #0c447c; }
    .col-listo .col-title { background: #eaf3de; color: #27500a; }

    .item-card { background: #fff; border: 0.5px solid #e5e5e5; border-radius: 10px; padding: 10px 12px; }
    .item-cliente { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
    .item-modelo { font-size: 11px; color: #666; margin-bottom: 4px; line-height: 1.3; }
    .item-pares { font-size: 12px; font-weight: 500; color: #1a1a1a; margin-bottom: 3px; }
    .item-fecha { font-size: 10px; color: #aaa; margin-bottom: 6px; }
    .item-actions { display: flex; gap: 4px; flex-wrap: wrap; }
    .emp-badge { font-size: 9px; padding: 2px 5px; border-radius: 8px; }
    .emp-r { background: #e6f1fb; color: #0c447c; }
    .emp-b { background: #e1f5ee; color: #085041; }

    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: flex-start; justify-content: center; padding: 1.5rem 1rem 5rem; overflow-y: auto; }
    .modal-bg.open { display: flex; }
    .modal { background: #fff; border-radius: 16px; padding: 1.5rem; width: 100%; max-width: 520px; margin: auto; }
    .modal-title { font-size: 16px; font-weight: 500; margin-bottom: 1.25rem; display: flex; justify-content: space-between; align-items: center; }
    .modal-close { cursor: pointer; font-size: 22px; color: #888; background: none; border: none; line-height: 1; }
    .modal-actions { display: flex; gap: 8px; margin-top: 1.25rem; justify-content: flex-end; }
    .detalle-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 0.5px solid #f0f0f0; font-size: 13px; }
    .detalle-row:last-child { border-bottom: none; }
    .detalle-label { color: #888; }
    .detalle-val { font-weight: 500; }
    .empty-state { text-align: center; padding: 2rem; color: #aaa; font-size: 12px; }

    .registrar-wrap { background: #fff; border: 0.5px solid #e5e5e5; border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem; }
    .registrar-title { font-size: 14px; font-weight: 500; margin-bottom: 1rem; }
    .registrar-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-title">Goodcomex</div>
      <div class="login-sub">Stock y empaque</div>
      <div class="login-err" id="login-err">Email o contraseña incorrectos</div>
      <div class="field"><label>Email</label><input type="email" id="login-email" placeholder="tu@email.com" /></div>
      <div class="field"><label>Contraseña</label><input type="password" id="login-pass" placeholder="••••••••" /></div>
      <button class="btn btn-primary" style="width:100%;margin-top:4px;" onclick="login()">Ingresar</button>
    </div>
  </div>
</div>

<div id="app-screen" style="display:none;">
  <div class="container">

    <div class="toolbar">
      <span style="font-size:15px;font-weight:500;">Stock y empaque</span>
      <button class="btn btn-primary btn-sm" id="btn-registrar" onclick="abrirRegistrar()" style="display:none;">+ Registrar ingreso</button>
      <button class="btn btn-outline btn-sm" onclick="cargarStock()">Actualizar</button>
      <span class="user-label" id="user-label"></span>
      <button class="btn btn-outline btn-sm" onclick="logout()">Salir</button>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">En empaque</div>
        <div class="stat-value" id="stat-empaque">—</div>
        <div class="stat-sub">lotes pendientes</div>
      </div>
      <div class="stat">
        <div class="stat-label">En stock</div>
        <div class="stat-value" id="stat-stock">—</div>
        <div class="stat-sub">pares disponibles</div>
      </div>
      <div class="stat">
        <div class="stat-label">Listos para entregar</div>
        <div class="stat-value" id="stat-listo">—</div>
        <div class="stat-sub">pares</div>
      </div>
    </div>

    <div class="cols">
      <div class="col-wrap col-empaque">
        <div class="col-title">
          <span>Empaque</span>
          <span id="cnt-empaque">0</span>
        </div>
        <div class="col-body" id="col-empaque-body"></div>
      </div>
      <div class="col-wrap col-stock">
        <div class="col-title">
          <span>Stock</span>
          <span id="cnt-stock">0</span>
        </div>
        <div class="col-body" id="col-stock-body"></div>
      </div>
      <div class="col-wrap col-listo">
        <div class="col-title">
          <span>Listo para entregar</span>
          <span id="cnt-listo">0</span>
        </div>
        <div class="col-body" id="col-listo-body"></div>
      </div>
    </div>

  </div>
</div>

<div class="modal-bg" id="modal-registrar">
  <div class="modal">
    <div class="modal-title">
      <span>Registrar ingreso a empaque</span>
      <button class="modal-close" onclick="cerrarModal('modal-registrar')">×</button>
    </div>
    <div class="field">
      <label>Producto / modelo</label>
      <input type="text" id="reg-producto" placeholder="ej: Borceguí Alta Montaña 500" />
    </div>
    <div class="registrar-grid">
      <div class="field">
        <label>Empresa</label>
        <select id="reg-empresa">
          <option value="El Resero">El Resero</option>
          <option value="Empresa B">Empresa B</option>
        </select>
      </div>
      <div class="field">
        <label>Talle</label>
        <input type="text" id="reg-talle" placeholder="ej: 41" />
      </div>
      <div class="field">
        <label>Cantidad (pares)</label>
        <input type="number" id="reg-cantidad" min="1" placeholder="0" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="cerrarModal('modal-registrar')">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmarRegistro()">Registrar</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal-mover">
  <div class="modal">
    <div class="modal-title">
      <span id="mover-titulo">Mover item</span>
      <button class="modal-close" onclick="cerrarModal('modal-mover')">×</button>
    </div>
    <input type="hidden" id="mover-id" />
    <div id="mover-detalle" style="margin-bottom:1rem;font-size:13px;color:#555;"></div>
    <div class="field">
      <label>Mover a</label>
      <select id="mover-estado">
        <option value="empaque">Empaque</option>
        <option value="stock">Stock</option>
        <option value="listo">Listo para entregar</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="cerrarModal('modal-mover')">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmarMover()">Confirmar</button>
    </div>
  </div>
</div>

<div class="topbar">
  <span class="topbar-title">Goodcomex</span>
  <nav class="topbar-nav">
    <a class="nav-tab" href="/index.html">Dashboard</a>
    <a class="nav-tab" href="/produccion.html">Producción</a>
    <a class="nav-tab active" href="/stock.html">Stock</a>
  </nav>
</div>

<script>
  let usuario = null;
  let stockItems = [];
  let lotesEnEmpaque = [];

  function login() {
    const email = document.getElementById('login-email').value.trim();
    const pass = document.getElementById('login-pass').value;
    fetch('/api/produccion?action=login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass })
    }).then(r => r.json()).then(data => {
      if (data.error) { document.getElementById('login-err').style.display = 'block'; return; }
      usuario = data.usuario;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app-screen').style.display = 'block';
      document.getElementById('user-label').textContent = usuario.nombre;
      if (usuario.rol === 'empaque' || usuario.rol === 'admin' || usuario.rol === 'produccion') {
        document.getElementById('btn-registrar').style.display = 'inline-block';
      }
      cargarStock();
    }).catch(() => { document.getElementById('login-err').style.display = 'block'; });
  }

  function logout() {
    usuario = null;
    document.getElementById('login-screen').style.display = 'block';
    document.getElementById('app-screen').style.display = 'none';
    document.getElementById('login-email').value = '';
    document.getElementById('login-pass').value = '';
  }

  async function cargarStock() {
    const [resStock, resPedidos] = await Promise.all([
      fetch('/api/produccion?action=stock'),
      fetch('/api/produccion?action=pedidos')
    ]);
    stockItems = await resStock.json();
    const pedidos = await resPedidos.json();
    lotesEnEmpaque = pedidos.flatMap(p =>
      (p.lotes || []).filter(l => l.etapa === 'empaque').map(l => ({ ...l, pedido: p }))
    );
    renderStock();
    renderStats();
  }

  function renderStats() {
    const enEmpaque = lotesEnEmpaque.length;
    const enStock = stockItems.filter(i => i.estado === 'stock').reduce((a,i) => a + i.cantidad, 0);
    const enListo = stockItems.filter(i => i.estado === 'listo').reduce((a,i) => a + i.cantidad, 0);
    document.getElementById('stat-empaque').textContent = enEmpaque;
    document.getElementById('stat-stock').textContent = enStock.toLocaleString('es-AR');
    document.getElementById('stat-listo').textContent = enListo.toLocaleString('es-AR');
  }

  function diasDesde(fecha) {
    if (!fecha) return 0;
    return Math.floor((new Date() - new Date(fecha)) / (1000*60*60*24));
  }

  function renderStock() {
    const empaque = document.getElementById('col-empaque-body');
    const stock = document.getElementById('col-stock-body');
    const listo = document.getElementById('col-listo-body');

    document.getElementById('cnt-empaque').textContent = lotesEnEmpaque.length;
    document.getElementById('cnt-stock').textContent = stockItems.filter(i => i.estado === 'stock').length;
    document.getElementById('cnt-listo').textContent = stockItems.filter(i => i.estado === 'listo').length;

    empaque.innerHTML = lotesEnEmpaque.length === 0
      ? '<div class="empty-state">Sin lotes en empaque</div>'
      : lotesEnEmpaque.map(l => `
          <div class="item-card">
            <div class="item-cliente">${l.pedido.tipo === 'stock' ? 'Stock propio' : (l.pedido.cliente || '—')}</div>
            <div class="item-modelo">${l.pedido.producto}</div>
            <div class="item-pares">${l.cantidad} pares</div>
            <div class="item-fecha">${l.numero} · ${diasDesde(l.updated_at)}d en empaque</div>
            <div style="margin-bottom:6px;">
              <span class="emp-badge ${l.pedido.empresa === 'El Resero' ? 'emp-r' : 'emp-b'}">${l.pedido.empresa}</span>
            </div>
            <div class="item-actions">
              <button class="btn btn-success btn-sm" onclick="moverLoteAStock(${l.id}, 'stock')">→ Stock</button>
              <button class="btn btn-warn btn-sm" onclick="moverLoteAStock(${l.id}, 'listo')">→ Listo</button>
            </div>
          </div>`).join('');

    const itemsStock = stockItems.filter(i => i.estado === 'stock');
    stock.innerHTML = itemsStock.length === 0
      ? '<div class="empty-state">Sin items en stock</div>'
      : itemsStock.map(i => `
          <div class="item-card">
            <div class="item-cliente">${i.pedido?.cliente || i.producto}</div>
            <div class="item-modelo">${i.producto}${i.talle ? ' · T' + i.talle : ''}</div>
            <div class="item-pares">${i.cantidad} pares</div>
            <div class="item-fecha">${new Date(i.created_at).toLocaleDateString('es-AR',{day:'numeric',month:'short'})}</div>
            <div style="margin-bottom:6px;">
              <span class="emp-badge ${i.empresa === 'El Resero' ? 'emp-r' : 'emp-b'}">${i.empresa}</span>
            </div>
            <div class="item-actions">
              <button class="btn btn-warn btn-sm" onclick="abrirMover(${i.id}, '${i.producto}', ${i.cantidad}, 'stock')">Mover</button>
            </div>
          </div>`).join('');

    const itemsListo = stockItems.filter(i => i.estado === 'listo');
    listo.innerHTML = itemsListo.length === 0
      ? '<div class="empty-state">Sin items listos</div>'
      : itemsListo.map(i => `
          <div class="item-card">
            <div class="item-cliente">${i.pedido?.cliente || i.producto}</div>
            <div class="item-modelo">${i.producto}${i.talle ? ' · T' + i.talle : ''}</div>
            <div class="item-pares">${i.cantidad} pares</div>
            <div class="item-fecha">${new Date(i.created_at).toLocaleDateString('es-AR',{day:'numeric',month:'short'})}</div>
            <div style="margin-bottom:6px;">
              <span class="emp-badge ${i.empresa === 'El Resero' ? 'emp-r' : 'emp-b'}">${i.empresa}</span>
            </div>
            <div class="item-actions">
              <button class="btn btn-outline btn-sm" onclick="abrirMover(${i.id}, '${i.producto}', ${i.cantidad}, 'listo')">Mover</button>
            </div>
          </div>`).join('');
  }

  async function moverLoteAStock(loteId, estado) {
    const lote = lotesEnEmpaque.find(l => l.id === loteId);
    if (!lote) return;
    await fetch('/api/produccion?action=etapa-lote', {
      method: 'PUT', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ lote_id: loteId, etapa: estado === 'listo' ? 'listo' : 'stock', usuario: usuario.nombre })
    });
    await fetch('/api/produccion?action=crear', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        numero: lote.numero + '-S',
        cliente: lote.pedido.cliente || '',
        producto: lote.pedido.producto,
        tipo: lote.pedido.tipo,
        cantidad_pedida: lote.cantidad,
        cantidad_stock: 0,
        empresa: lote.pedido.empresa,
        notas: 'Desde lote ' + lote.numero,
        talles: [],
        usuario: usuario.nombre,
        monto_total: 0
      })
    });
    cargarStock();
  }

  function abrirRegistrar() {
    document.getElementById('reg-producto').value = '';
    document.getElementById('reg-talle').value = '';
    document.getElementById('reg-cantidad').value = '';
    document.getElementById('modal-registrar').classList.add('open');
  }

  async function confirmarRegistro() {
    const producto = document.getElementById('reg-producto').value.trim();
    const talle = document.getElementById('reg-talle').value.trim();
    const cantidad = parseInt(document.getElementById('reg-cantidad').value) || 0;
    const empresa = document.getElementById('reg-empresa').value;
    if (!producto || cantidad < 1) return alert('Completá producto y cantidad');
    await fetch('/api/produccion?action=crear', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        numero: 'STK-' + Date.now(),
        cliente: '',
        producto: producto + (talle ? ' T' + talle : ''),
        tipo: 'stock',
        cantidad_pedida: 0,
        cantidad_stock: cantidad,
        empresa,
        notas: talle ? 'Talle ' + talle : '',
        talles: talle ? [{ talle, cantidad }] : [],
        usuario: usuario.nombre,
        monto_total: 0
      })
    });
    cerrarModal('modal-registrar');
    cargarStock();
  }

  function abrirMover(id, producto, cantidad, estadoActual) {
    document.getElementById('mover-id').value = id;
    document.getElementById('mover-titulo').textContent = 'Mover — ' + producto;
    document.getElementById('mover-detalle').textContent = cantidad + ' pares · actualmente en ' + (estadoActual === 'stock' ? 'Stock' : 'Listo para entregar');
    document.getElementById('mover-estado').value = estadoActual === 'stock' ? 'listo' : 'stock';
    document.getElementById('modal-mover').classList.add('open');
  }

  async function confirmarMover() {
    const id = parseInt(document.getElementById('mover-id').value);
    const estado = document.getElementById('mover-estado').value;
    await fetch('/api/produccion?action=stock-estado', {
      method: 'PUT', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, estado })
    });
    cerrarModal('modal-mover');
    cargarStock();
  }

  function cerrarModal(id) {
    document.getElementById(id).classList.remove('open');
  }

  document.getElementById('login-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
</script>
</body>
</html>
